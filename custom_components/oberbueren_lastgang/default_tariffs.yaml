# Default-Tarife für Strom Oberbüren (Privatkunden).
#
# Diese Datei wird von der Integration einmalig nach
#   <HA-config>/oberbueren_lastgang_tariffs.yaml
# kopiert, wenn dort noch keine eigene Datei existiert. Spätere
# Integrations-Updates überschreiben deine User-Datei NICHT.
#
# Bei Tarifänderung (typisch: 1. Januar): in deiner User-Datei einen
# weiteren Block mit neuem ``valid_from`` anhängen und beim bisherigen
# Block ein ``valid_until`` setzen. Die Integration liest die Datei bei
# jedem Import neu — kein HA-Restart nötig.
#
# Werte sind ohne MwSt. (8.1% wird automatisch addiert). Per-Position
# Override z.B. ``netzzuschlag_mwst: 0`` falls eine Position MwSt-frei
# ist.
#
# Quelle: Stromrechnung Oberbüren — Stand 2026.

- valid_from: 2026-01-01
  valid_until: ~                 # ~ = aktuell gültig
  mwst_default: 8.1

  netznutzung:
    wirkstrom_ht: 10.40          # Rp/kWh
    wirkstrom_nt: 10.00          # Rp/kWh
    grundgebuehr: 6.00           # CHF/Monat

  energiebezug:
    wirkstrom_ht: 17.30          # Rp/kWh
    wirkstrom_nt: 17.30          # Rp/kWh

  abgaben:
    sdl_swissgrid: 0.27          # Rp/kWh
    stromreserve: 0.41           # Rp/kWh
    solidarisierte_kosten: 0.05  # Rp/kWh
    netzzuschlag: 2.30           # Rp/kWh

  messtarif: 9.00                # CHF/Monat
